<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1115"/>
      <stop offset="100%" style="stop-color:#1A1D24"/>
    </linearGradient>

    <!-- Purple-blue gradient for accent -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#00C6FF"/>
    </linearGradient>

    <!-- Glow gradient overlay -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#0F1115;stop-opacity:0"/>
    </radialGradient>

    <!-- Glass inner shine -->
    <linearGradient id="glassShine" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.01"/>
    </linearGradient>

    <!-- Play button gradient -->
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A29BFE"/>
      <stop offset="100%" style="stop-color:#00C6FF"/>
    </linearGradient>

    <!-- Outer glow filter -->
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#6C5CE7" flood-opacity="0.5"/>
    </filter>

    <!-- Clip for rounded square -->
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <!-- Rounded square clip group -->
  <g clip-path="url(#roundedSquare)">
    <!-- Dark background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Radial glow center -->
    <rect width="1024" height="1024" fill="url(#glowGrad)"/>

    <!-- Subtle grid lines (film reel feel) -->
    <line x1="0" y1="200" x2="1024" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="0" y1="400" x2="1024" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="0" y1="600" x2="1024" y2="600" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="0" y1="800" x2="1024" y2="800" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="1024" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="1024" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="1024" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="1024" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

    <!-- Glass circle background (outer ring) -->
    <circle cx="512" cy="512" r="340"
      fill="rgba(255,255,255,0.04)"
      stroke="url(#accentGrad)"
      stroke-width="1.5"
      filter="url(#softShadow)"/>

    <!-- Glass circle inner -->
    <circle cx="512" cy="512" r="280"
      fill="rgba(255,255,255,0.06)"
      stroke="rgba(255,255,255,0.10)"
      stroke-width="1"/>

    <!-- Play triangle glow layer (blurred behind) -->
    <polygon points="448,370 448,654 690,512"
      fill="url(#accentGrad)"
      opacity="0.25"
      filter="url(#glowFilter)"/>

    <!-- Play triangle main -->
    <polygon points="452,376 452,648 686,512"
      fill="url(#playGrad)"
      filter="url(#softShadow)"/>

    <!-- Play triangle shine overlay -->
    <polygon points="452,376 452,490 570,420"
      fill="rgba(255,255,255,0.18)"/>

    <!-- Glass shine top-left -->
    <ellipse cx="380" cy="350" rx="180" ry="90"
      fill="url(#glassShine)"
      transform="rotate(-30, 380, 350)"/>

    <!-- Glass border shine -->
    <circle cx="512" cy="512" r="280"
      fill="none"
      stroke="rgba(255,255,255,0.08)"
      stroke-width="1"/>
  </g>

  <!-- Outer rounded border glow -->
  <rect x="2" y="2" width="1020" height="1020" rx="229" ry="229"
    fill="none"
    stroke="url(#accentGrad)"
    stroke-width="2"
    opacity="0.4"/>
</svg>
